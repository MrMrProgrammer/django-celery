services:
  redis:
    container_name: redis
    image: redis:7.0.11-alpine
    networks:
        - django-celery

  django:
    container_name: django
    build:
      context: ./eshop
      dockerfile: Dockerfile
    image: django-celery
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./eshop:/app/
    ports:
      - "8000:8000"
    networks:
      - django-celery
    depends_on:
      - redis

  celery:
    container_name: celery
    build:
      context: ./eshop
      dockerfile: Dockerfile
    command: celery --app=config worker -l INFO
    volumes:
      - ./eshop:/app/
    networks:
      - django-celery
    depends_on:
      - redis

networks:
  django-celery:
    name: django-celery
    driver: bridge
